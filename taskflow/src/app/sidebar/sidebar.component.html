<aside class="sidebar">
  <div class="brand">
    <div class="logo-badge">T</div>
    <div class="logo-text">TBanco</div>
  </div>

  <ul>
    @for (item of menuItems; track $index) {
      <li (click)="redirectToPage(item.page)" [class.active]="(page$ | async) === item.page">
        <mat-icon aria-hidden="false">{{ item.icon }}</mat-icon>
        <span class="menu-label">{{ item.label }}</span>
      </li>
    }
  </ul>
</aside>
